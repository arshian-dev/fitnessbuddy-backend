databases:
  - name: fitness-buddy-db
    databaseName: fitness_buddy
    user: admin

services:
  - type: web
    name: fitness-buddy-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: fitness-buddy-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: fitness-buddy-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fitness-buddy-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: fitness-buddy-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fitness-buddy-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
